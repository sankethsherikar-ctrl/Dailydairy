<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome To Cloud Note</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            width: 700px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            background-color: white;
            border-color: black;
            border-width: 0cqb;
        }

        .form-section {
            flex: 1;
            padding: 40px;
        }

        .info-section {
            flex: 1;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .info-section h2 {
            margin-bottom: 10px;
        }

        .form-section h2 {
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #5b0fbb, #1e60d5);
        }

        .login-link {
            margin-top: 10px;
            text-align: center;
        }

        .login-link a {
            color: #2575fc;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2>Sign Up</h2>

        <!-- ✅ Show alert if email exists -->
        <script th:if="${emailExists}" type="text/javascript">
            alert("This email is already registered. Please sign in with your username and password.");
        </script>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <input type="text" th:field="*{username}" placeholder="Username" required />
            <input type="email" th:field="*{email}" placeholder="Email" required />
            <input type="password" th:field="*{password}" placeholder="Password" required />
            <button type="submit">Sign Up</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <div class="info-section">
        <h2>Welcome To</h2>
        <h3>☁️ Cloud Note</h3>
        <p style="text-align: center;">
            Keep your daily notes secure, with image and date-based logs. <br/>
            Easy, fast, and accessible anywhere.
        </p>
    </div>
</div>

</body>
</html>
