<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #5b0fbb, #1e60d5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .login-container h2 {
            color: #333;
            text-align: center;
        }
        .login-container input, button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #2575fc;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #1a5edb;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Admin Login</h2>
    <form th:action="@{/admin/login}" method="post">
        <input type="text" name="identifier" placeholder="Name or Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>

        <!-- Error message shown only if "error" attribute is passed -->
        <p class="error" th:if="${error}" th:text="${error}"></p>
    </form>
</div>
</body>
</html>
