<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            width: 700px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            background-color: white;
        }

        .form-section {
            flex: 1;
            padding: 40px;
        }

        .info-section {
            flex: 1;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .info-section img {
            max-width: 100px;
            margin-bottom: 15px;
        }

        .info-section h2 {
            margin: 10px 0;
        }

        .form-section h2 {
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #5b0fbb, #1e60d5);
        }

        .message {
            margin-bottom: 10px;
            text-align: center;
        }

        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2>Login</h2>

        <!-- Display login error -->
        <div th:if="${param.error}" class="message error">
            Invalid username or password.
        </div>

        <!-- Display logout message -->
        <div th:if="${param.logout}" class="message success">
            You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Username" required /><br/>
            <input type="password" name="password" placeholder="Password" required /><br/>
            <button type="submit">User Login</button><br>
            <p style="text-align:center; margin-top: 10px;">
    <a href="/admin/login">Admin Login</a>
</p>

        </form>
    </div>

    <div class="info-section">
        <h2>Welcome To</h2>
        <h3>☁️ Cloud Note</h3>
        <p style="text-align: center;">
            Securely access your notes anytime, anywhere. <br/> Simply. Fast. Securely.
        </p>
    </div>
</div>

</body>
</html>
