<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Note</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        .header {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .container {
            background-color: white;
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid black;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 30px;
            border: 2px solid black;
            border-radius: 6px;
            background: rgba(43, 173, 3, 0.644);
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s ease;
            display: inline-block;
        }

        .btn:hover {
            background: #e6e6e6;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Add New Note</h2>
</div>

<div class="container">
    <div th:if="${error}" th:text="${error}" class="error"></div>

    <form th:action="@{/notes/add}" method="post" enctype="multipart/form-data" th:object="${note}">
        <label for="title">Title:</label>
        <input type="text" th:field="*{title}" required/>

        <label for="date">Date:</label>
        <input type="date" th:field="*{date}" required/>

        <label for="content">Content:</label>
        <textarea th:field="*{content}" required></textarea>

        <label for="imageFile">Image:</label>
        <input type="file" name="imageFile" accept="image/*" required/>

        <div class="btn-container">
            <button type="submit" class="btn">Save Note</button>
            <a href="/notes" class="btn">Back to List</a>
        </div>
    </form>
</div>

</body>
</html>
